<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnoldus | Kontak</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            text-decoration: none;
            color: #a0a0b8;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            padding: 6px 0;
            border-bottom: 2px solid transparent;
        }
        nav a:hover, nav a.active {
            color: #64ffda;
            border-bottom-color: #64ffda;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
        }
        .page-header {
            padding: 40px 20px 20px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-header h2 {
            font-size: 2em;
            color: #ffffff;
            border-left: 4px solid #64ffda;
            padding-left: 16px;
        }
        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 22px 25px;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease 0.1s both;
        }
        .contact-card:hover {
            border-color: rgba(100, 255, 218, 0.2);
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }
        .contact-icon {
            font-size: 28px;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .icon-wa { background: rgba(37, 211, 102, 0.15); }
        .icon-ig { background: rgba(225, 48, 108, 0.15); }
        .icon-gh { background: rgba(255, 255, 255, 0.08); }
        .contact-info h4 {
            color: #ccd6f6;
            font-size: 1em;
            margin-bottom: 2px;
        }
        .contact-info p {
            color: #8892b0;
            font-size: 0.85em;
        }
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #5a6078;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="skill.html">Skill</a>
        <a href="projek.html">Projek</a>
        <a href="kontak.html" class="active">Kontak</a>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>📞 Kontak</h2>
        </div>

        <a href="https://wa.me/6285246843647" class="contact-card">
            <div class="contact-icon icon-wa">💬</div>
            <div class="contact-info">
                <h4>WhatsApp</h4>
                <p>0852-4684-3647</p>
            </div>
        </a>

        <a href="https://instagram.com/arnoldfzebua" class="contact-card">
            <div class="contact-icon icon-ig">📸</div>
            <div class="contact-info">
                <h4>Instagram</h4>
                <p>@arnoldfzebua</p>
            </div>
        </a>

        <a href="https://github.com/arnoldus" class="contact-card">
            <div class="contact-icon icon-gh">🐱</div>
            <div class="contact-info">
                <h4>GitHub</h4>
                <p>github.com/arnoldus</p>
            </div>
        </a>
    </div>

    <footer>© 2026 Arnoldus — Dibuat dengan ❤️ dari HP</footer>

</body>
</html>
